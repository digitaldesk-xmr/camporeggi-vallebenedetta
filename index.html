<!DOCTYPE html>
<html>
<head>
    <title>TEST CAMPOREGGI</title>
    <meta charset="UTF-8">
    <style>
        body { font-family: Arial; padding: 20px; max-width: 600px; margin: 0 auto; }
        .prodotto { border: 1px solid #ccc; padding: 15px; margin: 10px 0; border-radius: 10px; }
        button { background: green; color: white; padding: 8px 16px; border: none; border-radius: 5px; cursor: pointer; }
        .carrello { background: #f0f0f0; padding: 15px; margin-top: 20px; border-radius: 10px; }
        .item { border-bottom: 1px solid #ccc; padding: 8px 0; }
        .totale { font-size: 1.3em; font-weight: bold; color: darkgreen; margin-top: 15px; }
        input { width: 80px; padding: 5px; }
        .prezzo-calcolato { color: blue; margin-left: 10px; font-weight: bold; }
    </style>
</head>
<body>
    <h1>🏪 Camporeggi Valle Benedetta</h1>
    <p>📧 ops.channel@proton.me | 📱 +39 331 621 9512 | 🤖 @MarketHubShop_bot</p>
    
    <div id="prodotti"></div>
    
    <div class="carrello">
        <h3>🛒 Carrello</h3>
        <div id="carrelloLista"></div>
        <div class="totale">💰 Totale: € <span id="totale">0.00</span></div>
        <button id="emailBtn">✉️ Ordina via Email</button>
        <button id="telegramBtn">📱 Ordina su Telegram</button>
        <button id="svuotaBtn">🗑️ Svuota</button>
    </div>

    <script>
        // DATABASE PRODOTTI
        const prodotti = [
            { nome: "Tagliolini freschi", prezzoKg: 8 },
            { nome: "Pappardelle fresche", prezzoKg: 8 },
            { nome: "Ragù di manzo", prezzoKg: 12 },
            { nome: "Roast beef", prezzoKg: 20 },
            { nome: "Melanzane alla parmigiana", prezzoKg: 7 }
        ];

        let carrello = [];

        // Mostra prodotti
        function mostraProdotti() {
            const container = document.getElementById('prodotti');
            container.innerHTML = '';
            
            for (let i = 0; i < prodotti.length; i++) {
                const p = prodotti[i];
                const div = document.createElement('div');
                div.className = 'prodotto';
                div.innerHTML = `
                    <strong>${p.nome}</strong><br>
                    Prezzo: €${p.prezzoKg}/kg<br>
                    <input type="number" id="peso_${i}" step="0.05" min="0.05" value="0.5" style="width:80px;"> kg
                    <button onclick="aggiungi('${p.nome}', ${p.prezzoKg}, ${i})">➕ Aggiungi</button>
                    <span id="preview_${i}" class="prezzo-calcolato"></span>
                `;
                container.appendChild(div);
                
                // Anteprima prezzo
                const input = document.getElementById(`peso_${i}`);
                const preview = document.getElementById(`preview_${i}`);
                input.addEventListener('input', function() {
                    let val = parseFloat(this.value);
                    if (isNaN(val)) val = 0;
                    let prezzoAnteprima = val * p.prezzoKg;
                    preview.innerHTML = `= €${prezzoAnteprima.toFixed(2)}`;
                });
                input.dispatchEvent(new Event('input'));
            }
        }

        // Aggiungi al carrello
        window.aggiungi = function(nome, prezzoKg, index) {
            const inputElem = document.getElementById(`peso_${index}`);
            let peso = parseFloat(inputElem.value);
            
            console.log("Nome:", nome);
            console.log("PrezzoKg:", prezzoKg);
            console.log("Peso:", peso);
            
            if (isNaN(peso)) {
                alert("Peso non valido!");
                return;
            }
            if (peso < 0.05) {
                alert("Peso minimo 0.05 kg (50 grammi)");
                return;
            }
            
            const totale = peso * prezzoKg;
            const totaleArrotondato = Math.round(totale * 100) / 100;
            
            console.log("Totale calcolato:", totaleArrotondato);
            
            carrello.push({
                nome: nome,
                peso: peso,
                prezzoTotale: totaleArrotondato
            });
            
            aggiornaCarrello();
            alert(`✅ Aggiunto: ${nome} - ${(peso*1000).toFixed(0)}g = €${totaleArrotondato.toFixed(2)}`);
        };

        // Aggiorna carrello
        function aggiornaCarrello() {
            const listaDiv = document.getElementById('carrelloLista');
            let totale = 0;
            let html = '';
            
            for (let i = 0; i < carrello.length; i++) {
                const item = carrello[i];
                totale += item.prezzoTotale;
                const pesoMostra = item.peso < 1 ? `${(item.peso*1000).toFixed(0)}g` : `${item.peso.toFixed(2)}kg`;
                html += `
                    <div class="item">
                        ${item.nome} - ${pesoMostra} = €${item.prezzoTotale.toFixed(2)}
                        <button onclick="rimuovi(${i})" style="background:red; color:white; margin-left:10px;">X</button>
                    </div>
                `;
            }
            
            if (carrello.length === 0) {
                html = '<p>Carrello vuoto</p>';
            }
            
            listaDiv.innerHTML = html;
            document.getElementById('totale').innerText = totale.toFixed(2);
        }

        window.rimuovi = function(idx) {
            carrello.splice(idx, 1);
            aggiornaCarrello();
        };

        document.getElementById('svuotaBtn').onclick = function() {
            carrello = [];
            aggiornaCarrello();
        };

        // Genera ordine
        function generaOrdine() {
            if (carrello.length === 0) {
                alert("Carrello vuoto!");
                return null;
            }
            
            let testo = "ORDINE CAMPOREGGI\n";
            testo += `Data: ${new Date().toLocaleString()}\n`;
            testo += "=".repeat(40) + "\n\n";
            let totale = 0;
            
            for (let i = 0; i < carrello.length; i++) {
                const item = carrello[i];
                const pesoMostra = item.peso < 1 ? `${(item.peso*1000).toFixed(0)} grammi` : `${item.peso.toFixed(2)} kg`;
                testo += `${i+1}. ${item.nome} - ${pesoMostra} = €${item.prezzoTotale.toFixed(2)}\n`;
                totale += item.prezzoTotale;
            }
            
            testo += `\nTOTALE: €${totale.toFixed(2)}\n`;
            testo += "\nDATI CONSEGNA:\n";
            testo += "Nome: ________\n";
            testo += "Indirizzo: ________\n";
            testo += "Telefono: ________\n";
            testo += "\nConsegne: Lunedì, Mercoledì, Venerdì";
            
            return testo;
        }

        document.getElementById('emailBtn').onclick = function() {
            const ordine = generaOrdine();
            if (ordine) {
                window.location.href = `mailto:ops.channel@proton.me?subject=Ordine&body=${encodeURIComponent(ordine)}`;
            }
        };

        document.getElementById('telegramBtn').onclick = function() {
            const ordine = generaOrdine();
            if (ordine) {
                navigator.clipboard.writeText(ordine);
                window.open('https://t.me/MarketHubShop_bot', '_blank');
                alert("Ordine copiato!");
            }
        };

        mostraProdotti();
    </script>
</body>
</html>
