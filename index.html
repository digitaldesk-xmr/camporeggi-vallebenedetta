<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Camporeggi - Test Calcoli</title>
    <style>
        body { font-family: Arial; padding: 20px; max-width: 800px; margin: 0 auto; }
        .prodotto { border: 1px solid #ddd; padding: 15px; margin: 10px 0; border-radius: 10px; }
        button { background: green; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; }
        .carrello { background: #f5f5f5; padding: 20px; border-radius: 10px; margin-top: 20px; }
        .item { border-bottom: 1px solid #ccc; padding: 10px 0; }
        .totale { font-size: 1.5em; font-weight: bold; color: darkgreen; margin-top: 20px; }
        input { width: 80px; padding: 5px; }
    </style>
</head>
<body>
    <h1>🏪 Camporeggi Valle Benedetta</h1>
    <p>Email: ops.channel@proton.me | Tel: +39 331 621 9512 | Bot: @MarketHubShop_bot</p>
    
    <div id="prodotti"></div>
    
    <div class="carrello">
        <h2>📦 Carrello</h2>
        <div id="carrelloLista"></div>
        <div class="totale">💰 Totale: € <span id="totale">0.00</span></div>
        <button id="btnEmail">✉️ Ordina via Email</button>
        <button id="btnTelegram">📱 Ordina su Telegram</button>
        <button id="btnSvuota">🗑️ Svuota carrello</button>
    </div>

    <script>
        // PRODOTTI (prezzi al kg)
        const prodotti = [
            { nome: "Tagliolini freschi", prezzoKg: 8 },
            { nome: "Pappardelle fresche", prezzoKg: 8 },
            { nome: "Ragù di manzo", prezzoKg: 12 },
            { nome: "Cinghiale in umido", prezzoKg: 15 },
            { nome: "Cervo in umido", prezzoKg: 15 },
            { nome: "Peposo", prezzoKg: 15 },
            { nome: "Arista", prezzoKg: 15 },
            { nome: "Roast beef", prezzoKg: 20 },
            { nome: "Pappa al pomodoro", prezzoKg: 8 },
            { nome: "Farro cotto", prezzoKg: 7 },
            { nome: "Lasagne", prezzoKg: 13 },
            { nome: "Melanzane parmigiana", prezzoKg: 7 },
            { nome: "Crostata albicocca", prezzoKg: 15 },
            { nome: "Cheesecake", prezzoKg: 15 }
        ];
        
        let carrello = [];
        
        // Mostra i prodotti
        function mostraProdotti() {
            const container = document.getElementById('prodotti');
            container.innerHTML = '';
            
            prodotti.forEach(prod => {
                const div = document.createElement('div');
                div.className = 'prodotto';
                div.innerHTML = `
                    <strong>${prod.nome}</strong><br>
                    Prezzo: €${prod.prezzoKg}/kg<br>
                    <input type="number" id="peso-${prod.nome.replace(/\s/g,'')}" step="0.05" min="0.05" value="0.5"> kg
                    <button onclick="aggiungiAlCarrello('${prod.nome}', ${prod.prezzoKg})">➕ Aggiungi</button>
                `;
                container.appendChild(div);
            });
        }
        
        // Calcola e aggiunge al carrello
        window.aggiungiAlCarrello = function(nome, prezzoKg) {
            const inputId = `peso-${nome.replace(/\s/g,'')}`;
            const input = document.getElementById(inputId);
            let peso = parseFloat(input.value);
            
            if(isNaN(peso) || peso <= 0) {
                alert("Inserisci un peso valido!");
                return;
            }
            if(peso < 0.05) {
                alert("Peso minimo 0.05 kg (50 grammi)");
                return;
            }
            if(peso > 5) {
                alert("Peso massimo 5 kg");
                return;
            }
            
            const prezzoTotale = peso * prezzoKg;
            
            carrello.push({
                nome: nome,
                peso: peso,
                prezzoKg: prezzoKg,
                totale: prezzoTotale
            });
            
            aggiornaCarrello();
            alert(`✅ Aggiunto: ${nome} - ${(peso*1000).toFixed(0)}g = €${prezzoTotale.toFixed(2)}`);
        };
        
        // Aggiorna visualizzazione carrello
        function aggiornaCarrello() {
            const lista = document.getElementById('carrelloLista');
            let totaleGenerale = 0;
            
            if(carrello.length === 0) {
                lista.innerHTML = '<p>Carrello vuoto</p>';
                document.getElementById('totale').innerText = '0.00';
                return;
            }
            
            let html = '';
            carrello.forEach((item, index) => {
                const pesoMostra = item.peso < 1 ? `${(item.peso*1000).toFixed(0)}g` : `${item.peso.toFixed(2)}kg`;
                html += `
                    <div class="item">
                        ${item.nome} - ${pesoMostra} = €${item.totale.toFixed(2)}
                        <button onclick="rimuoviItem(${index})" style="background:red; color:white; margin-left:10px;">❌</button>
                    </div>
                `;
                totaleGenerale += item.totale;
            });
            
            lista.innerHTML = html;
            document.getElementById('totale').innerText = totaleGenerale.toFixed(2);
        }
        
        window.rimuoviItem = function(index) {
            carrello.splice(index, 1);
            aggiornaCarrello();
        };
        
        // Svuota carrello
        document.getElementById('btnSvuota').addEventListener('click', () => {
            carrello = [];
            aggiornaCarrello();
            alert('Carrello svuotato!');
        });
        
        // Genera testo ordine
        function generaOrdine() {
            if(carrello.length === 0) {
                alert("Carrello vuoto!");
                return null;
            }
            
            let testo = "🛒 ORDINE CAMPOREGGI VALLE BENEDETTA\n";
            testo += `📅 Data: ${new Date().toLocaleString('it-IT')}\n`;
            testo += "=".repeat(40) + "\n\n";
            
            let totale = 0;
            carrello.forEach((item, i) => {
                const pesoMostra = item.peso < 1 ? `${(item.peso*1000).toFixed(0)} grammi` : `${item.peso.toFixed(2)} kg`;
                testo += `${i+1}. ${item.nome}\n`;
                testo += `   Peso: ${pesoMostra}\n`;
                testo += `   Prezzo: €${item.totale.toFixed(2)}\n\n`;
                totale += item.totale;
            });
            
            testo += "=".repeat(40) + "\n";
            testo += `💰 TOTALE: €${totale.toFixed(2)}\n\n`;
            testo += "DATI CONSEGNA:\n";
            testo += "Nome: _______________\n";
            testo += "Indirizzo: _______________\n";
            testo += "Telefono: _______________\n\n";
            testo += "Note: _______________\n";
            
            return testo;
        }
        
        // EMAIL
        document.getElementById('btnEmail').addEventListener('click', () => {
            const ordine = generaOrdine();
            if(!ordine) return;
            
            const corpo = encodeURIComponent(ordine);
            window.location.href = `mailto:ops.channel@proton.me?subject=Ordine%20Camporeggi&body=${corpo}`;
        });
        
        // TELEGRAM
        document.getElementById('btnTelegram').addEventListener('click', () => {
            const ordine = generaOrdine();
            if(!ordine) return;
            
            // Copia negli appunti
            navigator.clipboard.writeText(ordine);
            
            // Apre Telegram
            window.open('https://t.me/MarketHubShop_bot', '_blank');
            
            alert("✅ Ordine copiato! Incollalo nella chat di @MarketHubShop_bot");
        });
        
        // Avvia
        mostraProdotti();
    </script>
</body>
</html>
