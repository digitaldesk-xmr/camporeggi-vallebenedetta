<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Camporeggi - TEST</title>
    <style>
        body { font-family: Arial; padding: 20px; max-width: 800px; margin: 0 auto; }
        .prodotto { border: 1px solid #ddd; padding: 15px; margin: 10px 0; border-radius: 10px; background: white; }
        button { background: green; color: white; padding: 8px 16px; border: none; border-radius: 5px; cursor: pointer; }
        .carrello { background: #f5f5f5; padding: 20px; border-radius: 10px; margin-top: 20px; }
        .item { border-bottom: 1px solid #ccc; padding: 10px 0; }
        .totale { font-size: 1.5em; font-weight: bold; color: darkgreen; margin-top: 20px; }
        input { width: 80px; padding: 5px; }
        .prezzo-calcolato { color: blue; font-weight: bold; margin-left: 10px; }
    </style>
</head>
<body>
    <h1>🏪 Camporeggi Valle Benedetta - TEST</h1>
    <p>📧 ops.channel@proton.me | 📱 +39 331 621 9512 | 🤖 @MarketHubShop_bot</p>
    
    <div id="prodotti"></div>
    
    <div class="carrello">
        <h2>🛒 Carrello</h2>
        <div id="carrelloLista"></div>
        <div class="totale">💰 Totale: € <span id="totale">0.00</span></div>
        <button id="btnEmail">✉️ Ordina via Email</button>
        <button id="btnTelegram">📱 Ordina su Telegram</button>
        <button id="btnSvuota">🗑️ Svuota</button>
    </div>

    <script>
        // DATABASE PRODOTTI - PREZZI COME NUMERI
        const prodottiLista = [
            { nome: "Tagliolini freschi", prezzoKg: 8 },
            { nome: "Pappardelle fresche", prezzoKg: 8 },
            { nome: "Ragù di manzo", prezzoKg: 12 },
            { nome: "Cinghiale in umido", prezzoKg: 15 },
            { nome: "Cervo in umido", prezzoKg: 15 },
            { nome: "Roast beef", prezzoKg: 20 },
            { nome: "Pappa al pomodoro", prezzoKg: 8 },
            { nome: "Lasagne", prezzoKg: 13 },
            { nome: "Melanzane alla parmigiana", prezzoKg: 7 }
        ];

        let carrelloItems = [];

        // Mostra lista prodotti
        function mostraProdotti() {
            const container = document.getElementById('prodotti');
            container.innerHTML = '';
            
            for (let i = 0; i < prodottiLista.length; i++) {
                const p = prodottiLista[i];
                const idPeso = `peso_${i}`;
                const div = document.createElement('div');
                div.className = 'prodotto';
                div.innerHTML = `
                    <strong>${p.nome}</strong><br>
                    Prezzo: €${p.prezzoKg}/kg<br>
                    <input type="number" id="${idPeso}" step="0.05" min="0.05" value="0.5" style="width:80px;"> kg
                    <button onclick="aggiungi('${p.nome}', ${p.prezzoKg}, '${idPeso}')">➕ Aggiungi</button>
                    <span id="preview_${idPeso}" class="prezzo-calcolato"></span>
                `;
                container.appendChild(div);
                
                // Anteprima prezzo in tempo reale
                const input = document.getElementById(idPeso);
                const preview = document.getElementById(`preview_${idPeso}`);
                input.addEventListener('input', function() {
                    let val = parseFloat(this.value);
                    if (isNaN(val)) val = 0;
                    let prezzoAnteprima = val * p.prezzoKg;
                    preview.innerHTML = `= €${prezzoAnteprima.toFixed(2)}`;
                });
                // Trigger iniziale
                input.dispatchEvent(new Event('input'));
            }
        }

        // Funzione aggiungi al carrello (SEMPLICE E DIRETTA)
        window.aggiungi = function(nome, prezzoKg, idPeso) {
            const inputElem = document.getElementById(idPeso);
            let peso = parseFloat(inputElem.value);
            
            // Controlli
            if (isNaN(peso)) {
                alert("Inserisci un numero valido");
                return;
            }
            if (peso < 0.05) {
                alert("Peso minimo 0.05 kg (50 grammi)");
                return;
            }
            if (peso > 5) {
                alert("Peso massimo 5 kg");
                return;
            }
            
            // CALCOLO PRECISO
            const totale = peso * prezzoKg;
            const totaleArrotondato = Math.round(totale * 100) / 100;
            
            // Aggiungi al carrello
            carrelloItems.push({
                nome: nome,
                peso: peso,
                prezzoTotale: totaleArrotondato
            });
            
            // Aggiorna schermo
            aggiornaCarrello();
            alert(`✅ Aggiunto: ${nome} - ${(peso*1000).toFixed(0)}g = €${totaleArrotondato.toFixed(2)}`);
        };

        // Aggiorna visualizzazione carrello
        function aggiornaCarrello() {
            const listaDiv = document.getElementById('carrelloLista');
            let totaleGenerale = 0;
            
            if (carrelloItems.length === 0) {
                listaDiv.innerHTML = '<p>Carrello vuoto</p>';
                document.getElementById('totale').innerText = '0.00';
                return;
            }
            
            let html = '';
            for (let i = 0; i < carrelloItems.length; i++) {
                const item = carrelloItems[i];
                const pesoMostra = item.peso < 1 ? `${(item.peso*1000).toFixed(0)}g` : `${item.peso.toFixed(2)}kg`;
                html += `
                    <div class="item">
                        ${item.nome} - ${pesoMostra} = €${item.prezzoTotale.toFixed(2)}
                        <button onclick="rimuoviItem(${i})" style="background:red; color:white; margin-left:10px;">❌</button>
                    </div>
                `;
                totaleGenerale += item.prezzoTotale;
            }
            
            listaDiv.innerHTML = html;
            document.getElementById('totale').innerText = totaleGenerale.toFixed(2);
        }

        // Rimuovi item
        window.rimuoviItem = function(indice) {
            carrelloItems.splice(indice, 1);
            aggiornaCarrello();
        };

        // Svuota carrello
        document.getElementById('btnSvuota').addEventListener('click', function() {
            carrelloItems = [];
            aggiornaCarrello();
            alert('Carrello svuotato');
        });

        // Genera testo ordine
        function generaTestoOrdine() {
            if (carrelloItems.length === 0) {
                alert("Carrello vuoto!");
                return null;
            }
            
            let testo = "🛒 ORDINE CAMPOREGGI VALLE BENEDETTA\n";
            testo += `📅 Data: ${new Date().toLocaleString('it-IT')}\n`;
            testo += "=".repeat(40) + "\n\n";
            
            let totale = 0;
            for (let i = 0; i < carrelloItems.length; i++) {
                const item = carrelloItems[i];
                const pesoMostra = item.peso < 1 ? `${(item.peso*1000).toFixed(0)} grammi` : `${item.peso.toFixed(2)} kg`;
                testo += `${i+1}. ${item.nome}\n`;
                testo += `   Peso: ${pesoMostra}\n`;
                testo += `   Prezzo: €${item.prezzoTotale.toFixed(2)}\n\n`;
                totale += item.prezzoTotale;
            }
            
            testo += "=".repeat(40) + "\n";
            testo += `💰 TOTALE: €${totale.toFixed(2)}\n\n`;
            testo += "📦 DATI CONSEGNA:\n";
            testo += "Nome: _______________\n";
            testo += "Indirizzo: _______________\n";
            testo += "Telefono: _______________\n\n";
            testo += "🚚 Consegne: Lunedì, Mercoledì, Venerdì\n";
            testo += "🙏 Grazie!\n📞 +39 331 621 9512\n📧 ops.channel@proton.me";
            
            return testo;
        }

        // Pulsante Email
        document.getElementById('btnEmail').addEventListener('click', function() {
            const ordine = generaTestoOrdine();
            if (ordine) {
                window.location.href = `mailto:ops.channel@proton.me?subject=Ordine%20Camporeggi&body=${encodeURIComponent(ordine)}`;
            }
        });

        // Pulsante Telegram
        document.getElementById('btnTelegram').addEventListener('click', function() {
            const ordine = generaTestoOrdine();
            if (ordine) {
                navigator.clipboard.writeText(ordine);
                window.open('https://t.me/MarketHubShop_bot', '_blank');
                alert("Ordine copiato! Incollalo nella chat di @MarketHubShop_bot");
            }
        });

        // Avvia
        mostraProdotti();
    </script>
</body>
</html>
