<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Camporeggi – Test Calcoli</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 800px; margin: 20px auto; padding: 20px; background: #fef9f0; }
        .prodotto { border: 1px solid #e2cfb3; padding: 15px; margin: 10px 0; border-radius: 20px; background: white; }
        button { background: #2c5e3a; color: white; border: none; padding: 8px 16px; border-radius: 30px; cursor: pointer; }
        .carrello { background: #fff7ef; padding: 20px; border-radius: 20px; margin-top: 30px; }
        .item { border-bottom: 1px solid #e2cfb3; padding: 10px 0; }
        .totale { font-size: 1.4em; font-weight: bold; color: #2c5e3a; text-align: right; }
        input { width: 80px; padding: 6px; border-radius: 20px; border: 1px solid #ccc; }
    </style>
</head>
<body>
    <h1>🏪 Camporeggi Valle Benedetta</h1>
    <p>📧 ops.channel@proton.me | 📱 +39 331 621 9512 | 🤖 @MarketHubShop_bot</p>

    <div id="prodotti"></div>

    <div class="carrello">
        <h2>🛒 Carrello</h2>
        <div id="listaCarrello"></div>
        <div class="totale">💰 Totale: € <span id="totale">0.00</span></div>
        <button id="emailBtn">✉️ Ordina via Email</button>
        <button id="telegramBtn">📱 Ordina su Telegram</button>
        <button id="svuotaBtn">🗑️ Svuota carrello</button>
    </div>

    <script>
        // ---------- DATABASE PRODOTTI (tutti i prezzi sono numeri) ----------
        const prodotti = [
            { nome: "Tagliolini freschi", prezzoKg: 8 },
            { nome: "Pappardelle fresche", prezzoKg: 8 },
            { nome: "Ragù di manzo", prezzoKg: 12 },
            { nome: "Cinghiale in umido", prezzoKg: 15 },
            { nome: "Cervo in umido", prezzoKg: 15 },
            { nome: "Peposo", prezzoKg: 15 },
            { nome: "Arista", prezzoKg: 15 },
            { nome: "Roast beef", prezzoKg: 20 },
            { nome: "Pinse 200g", prezzoKg: 10, fisso: true, pesoFisso: 0.2, prezzoFisso: 2 },
            { nome: "Pinse 400g", prezzoKg: 10, fisso: true, pesoFisso: 0.4, prezzoFisso: 3 },
            { nome: "Schiacciata carbone 200g", prezzoKg: 10, fisso: true, pesoFisso: 0.2, prezzoFisso: 2 },
            { nome: "Schiacciata carbone 400g", prezzoKg: 10, fisso: true, pesoFisso: 0.4, prezzoFisso: 3 },
            { nome: "Pappa al pomodoro", prezzoKg: 8 },
            { nome: "Farro cotto", prezzoKg: 7 },
            { nome: "Lasagne", prezzoKg: 13 },
            { nome: "Melanzane parmigiana", prezzoKg: 7 },
            { nome: "Crostata albicocca", prezzoKg: 15 },
            { nome: "Cheesecake", prezzoKg: 15 },
            { nome: "Torta del nonno", prezzoKg: 15 },
            { nome: "Torta della nonna", prezzoKg: 15 }
        ];

        let carrello = [];

        // Funzione per mostrare i prodotti
        function mostraProdotti() {
            const container = document.getElementById('prodotti');
            container.innerHTML = '';
            for (let prod of prodotti) {
                const div = document.createElement('div');
                div.className = 'prodotto';
                if (prod.fisso) {
                    div.innerHTML = `
                        <strong>${prod.nome}</strong><br>
                        Prezzo: €${prod.prezzoFisso} (${prod.pesoFisso*1000}g)<br>
                        <button onclick="aggiungiFisso('${prod.nome}', ${prod.pesoFisso}, ${prod.prezzoFisso})">➕ Aggiungi</button>
                    `;
                } else {
                    div.innerHTML = `
                        <strong>${prod.nome}</strong><br>
                        Prezzo: €${prod.prezzoKg}/kg<br>
                        <input type="number" id="peso-${prod.nome.replace(/\s/g,'')}" step="0.01" min="0.05" value="0.5"> kg
                        <button onclick="aggiungiVariabile('${prod.nome}', ${prod.prezzoKg})">➕ Aggiungi</button>
                    `;
                }
                container.appendChild(div);
            }
        }

        // Aggiungi prodotto a peso variabile
        window.aggiungiVariabile = function(nome, prezzoKg) {
            const inputId = `peso-${nome.replace(/\s/g,'')}`;
            const input = document.getElementById(inputId);
            let peso = parseFloat(input.value);
            if (isNaN(peso) || peso < 0.05) {
                alert("Peso minimo 0.05 kg (50 grammi)");
                return;
            }
            if (peso > 5) {
                alert("Peso massimo 5 kg");
                return;
            }
            const totale = peso * prezzoKg;
            const totaleArrotondato = Math.round(totale * 100) / 100;
            carrello.push({
                nome: nome,
                pesoKg: peso,
                prezzoTotale: totaleArrotondato
            });
            aggiornaCarrello();
            alert(`✅ Aggiunto ${nome} - ${(peso*1000).toFixed(0)}g = €${totaleArrotondato.toFixed(2)}`);
        };

        // Aggiungi prodotto a peso fisso
        window.aggiungiFisso = function(nome, pesoKg, prezzo) {
            carrello.push({
                nome: nome,
                pesoKg: pesoKg,
                prezzoTotale: prezzo
            });
            aggiornaCarrello();
            alert(`✅ Aggiunto ${nome} = €${prezzo.toFixed(2)}`);
        };

        // Aggiorna visualizzazione carrello e totale
        function aggiornaCarrello() {
            const listaDiv = document.getElementById('listaCarrello');
            let totale = 0;
            if (carrello.length === 0) {
                listaDiv.innerHTML = '<p>Carrello vuoto</p>';
                document.getElementById('totale').innerText = '0.00';
                return;
            }
            let html = '';
            carrello.forEach((item, idx) => {
                const pesoMostra = item.pesoKg < 1 ? `${(item.pesoKg*1000).toFixed(0)} grammi` : `${item.pesoKg.toFixed(2)} kg`;
                html += `
                    <div class="item">
                        <strong>${item.nome}</strong> - ${pesoMostra} → €${item.prezzoTotale.toFixed(2)}
                        <button onclick="rimuoviItem(${idx})" style="background:#b00020; color:white; margin-left:10px;">🗑️</button>
                    </div>
                `;
                totale += item.prezzoTotale;
            });
            listaDiv.innerHTML = html;
            document.getElementById('totale').innerText = totale.toFixed(2);
        }

        window.rimuoviItem = function(idx) {
            carrello.splice(idx, 1);
            aggiornaCarrello();
        };

        document.getElementById('svuotaBtn').addEventListener('click', () => {
            carrello = [];
            aggiornaCarrello();
        });

        // Genera testo ordine
        function generaOrdine() {
            if (carrello.length === 0) {
                alert("Carrello vuoto");
                return null;
            }
            let testo = "🛒 ORDINE CAMPOREGGI VALLE BENEDETTA\n";
            testo += `📅 Data: ${new Date().toLocaleString('it-IT')}\n`;
            testo += "=".repeat(40) + "\n\n";
            let totale = 0;
            carrello.forEach((item, i) => {
                const pesoMostra = item.pesoKg < 1 ? `${(item.pesoKg*1000).toFixed(0)} grammi` : `${item.pesoKg.toFixed(2)} kg`;
                testo += `${i+1}. ${item.nome}\n`;
                testo += `   Peso: ${pesoMostra}\n`;
                testo += `   Prezzo: €${item.prezzoTotale.toFixed(2)}\n\n`;
                totale += item.prezzoTotale;
            });
            testo += "=".repeat(40) + "\n";
            testo += `💰 TOTALE: €${totale.toFixed(2)}\n\n`;
            testo += "📦 DATI CONSEGNA:\n";
            testo += "Nome: _______________\n";
            testo += "Indirizzo: _______________\n";
            testo += "Telefono: _______________\n\n";
            testo += "🚚 Consegne: Lunedì, Mercoledì, Venerdì\n";
            return testo;
        }

        // Email
        document.getElementById('emailBtn').addEventListener('click', () => {
            const ordine = generaOrdine();
            if (ordine) {
                window.location.href = `mailto:ops.channel@proton.me?subject=Ordine%20Camporeggi&body=${encodeURIComponent(ordine)}`;
            }
        });

        // Telegram
        document.getElementById('telegramBtn').addEventListener('click', () => {
            const ordine = generaOrdine();
            if (ordine) {
                navigator.clipboard.writeText(ordine);
                window.open('https://t.me/MarketHubShop_bot', '_blank');
                alert("Ordine copiato. Incollalo nella chat del bot.");
            }
        });

        mostraProdotti();
    </script>
</body>
</html>
